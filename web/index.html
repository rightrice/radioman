<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RADIOMAN — Field Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/sandbox.css">
  <link rel="stylesheet" href="/assets/css/radioman.css">
</head>
<body>
  <div class="aap-portfolio rm-root" id="rmRoot" data-aap-theme="dark">

    <!-- Header -->
    <header class="dash-header">
      <div class="dash-header-inner">
        <div class="dash-brand">
          <span class="rm-logo-mark">RM</span>
          <div>
            <span class="dash-brand-name">RADIOMAN</span>
            <span class="dash-brand-sub">Field Dashboard</span>
          </div>
        </div>
        <nav class="rm-nav" id="rmNav">
          <button class="rm-nav-btn active" data-view="overview">Overview</button>
          <button class="rm-nav-btn" data-view="networks">Networks</button>
          <button class="rm-nav-btn" data-view="clients">Clients</button>
          <button class="rm-nav-btn" data-view="captures">Captures</button>
          <button class="rm-nav-btn" data-view="stats">Stats</button>
          <button class="rm-nav-btn" data-view="graph">Graph</button>
          <button class="rm-nav-btn" data-view="hosts">LAN Hosts</button>
          <button class="rm-nav-btn" data-view="log">Log</button>
          <button class="rm-nav-btn" data-view="ignore">Ignore List</button>
          <button class="rm-nav-btn" data-view="ai">AI</button>
        </nav>
        <div class="dash-header-right">
          <span class="rm-status-dot" id="rmStatusDot" title="Connection status"></span>
          <button class="dash-theme-btn" id="rmThemeBtn" type="button" aria-label="Toggle theme">☾</button>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="dash-main" id="rmMain" aria-live="polite">
      <div class="rm-loading" id="rmLoading">
        <div class="rm-spinner"></div>
        <p>Connecting to radioman...</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="dash-footer">
      <div class="dash-footer-inner">
        <span class="rm-footer-brand">RADIOMAN</span>
        <span id="rmUptime" class="rm-mono">uptime: --</span>
        <span id="rmRefreshNote" class="rm-muted">auto-refresh every 5s</span>
      </div>
    </footer>

  </div>

  <script src="/assets/js/dashboard.js"></script>
</body>
</html>
